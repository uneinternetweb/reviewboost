name: Build Windows agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install NSSM
        working-directory: .
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          choco install nssm --no-progress -y
          New-Item -ItemType Directory -Force -Path 'installer/nssm' | Out-Null
          $nssm = (Get-Command nssm.exe).Source
          Copy-Item $nssm 'installer/nssm/nssm.exe' -Force

      - name: Build exe with PyInstaller
        working-directory: .
        run: pyinstaller pyinstaller.spec --clean --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer with Inno Setup
        working-directory: .
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc installer/reviewboost-agent.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReviewBoostAgentSetup
          path: installer/Output/ReviewBoostAgentSetup.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/ReviewBoostAgentSetup.exe
          generate_release_notes: true